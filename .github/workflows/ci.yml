name: CI

on:
  push:
    branches: [ main , dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        config: [Release]
    steps:
      - uses: actions/checkout@v4
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-
      - name: Configure
        run: |
          # Install Google Test on macOS
            if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
              brew install googletest
            fi
          # Configure the project
          cmake -S . -B build -DBUILD_TESTS=ON
      - name: Build
        run: |
          cmake --build build --config ${{ matrix.config }} -- -j 2
      - name: Run unit tests
        run: |
          ctest --test-dir build --output-on-failure
      - name: Run headless CLI smoke test
        run: |
          CLI="build/snes9x-cli"
          if [ ! -x "$CLI" ]; then
            CLI="build/src/cli/snes9x-cli"
          fi
          if [ ! -x "$CLI" ]; then
            echo "CLI binary not found: $CLI"
            exit 2
          fi
          python3 tools/ci_smoke_test.py "$CLI" build/tests/data/dummy.sfc
      - name: Print smoke test output
        if: success()
        run: |
          CLI="build/snes9x-cli"
          if [ ! -x "$CLI" ]; then
            CLI="build/src/cli/snes9x-cli"
          fi
          if [ -x "$CLI" ]; then
            "$CLI" --load build/tests/data/dummy.sfc --run 1 --json-output
          else
            echo "No CLI binary found to print smoke test output"
          fi
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build

      - name: Upload artifacts on failure
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: build/snes9x-cli
